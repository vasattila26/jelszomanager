<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Biztonságos Jelszókezelő</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        :root { --bg: #f5f7fa; --card: #ffffff; --text: #1a202c; --primary: #3182ce; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 400px; background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); box-sizing: border-box; }
        h2, h3 { text-align: center; margin-top: 0; color: #2d3748; }
        .section { border-top: 1px solid #e2e8f0; padding-top: 15px; margin-top: 15px; }
        label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 5px; color: #4a5568; }
        input { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #cbd5e0; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: #38a169; color: white; }
        .btn-secondary { background: #edf2f7; color: #4a5568; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { padding: 8px; border-bottom: 1px solid #e2e8f0; text-align: left; word-break: break-all; }
        th { background: #f7fafc; }
    </style>
</head>
<body>

<div class="container">
    <!-- LOGIN PANEL -->
    <div id="login-panel">
        <h2>Biztonsági Belépés</h2>
        <label>Mesterjelszó</label>
        <input type="password" id="master-pass" placeholder="••••••••">
        <button class="btn-primary" onclick="handleLogin()">BELÉPÉS / FIÓK LÉTREHOZÁSA</button>
    </div>

    <!-- MAIN PANEL -->
    <div id="main-panel" class="hidden">
        <h2>Jelszókezelő Széf</h2>
        
        <!-- Generáló -->
        <div class="section">
            <h3>Jelszó Generátor</h3>
            <label>Hossz: <span id="length-val">16</span></label>
            <input type="range" id="pass-length" min="8" max="64" value="16" oninput="document.getElementById('length-val').innerText=this.value">
            <button class="btn-secondary" onclick="generatePassword()">Generálás</button>
            <input type="text" id="gen-result" readonly style="text-align:center; font-weight:bold; background:#f7fafc;">
        </div>

        <!-- Mentés -->
        <div class="section">
            <h3>Új Jelszó Mentése</h3>
            <label>Weboldal / App</label>
            <input type="text" id="app-name" placeholder="pl. Facebook">
            <label>Felhasználónév</label>
            <input type="text" id="username" placeholder="user@email.com">
            <button class="btn-success" onclick="handleSave()">Biztonságos Mentés</button>
        </div>

        <!-- Lista -->
        <div class="section">
            <h3>Mentett Adatok</h3>
            <div style="overflow-x:auto;">
                <table id="vault-table">
                    <thead><tr><th>Hely</th><th>User</th><th>Jelszó</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <!-- Mentés fájlba -->
        <div class="section">
            <button class="btn-secondary" onclick="exportBackup()">📥 Biztonsági mentés letöltése</button>
        </div>
    </div>
</div>

<script>
let derivedKey = null;

// --- NATÍV IPHONE-BARÁT TITKOSÍTÁSI LOGIKA ---
async function getKey(password, salt) {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey(
        "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
    );
    return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
        keyMaterial,
        { name: "AES-GCM", length: 256 },
        false,
        ["encrypt", "decrypt"]
    );
}

async function handleLogin() {
    const password = document.getElementById("master-pass").value;
    if (!password) { alert("Adj meg egy jelszót!"); return; }

    // Új fiók esetén legenerálja a sót
    if (!localStorage.getItem("pyspef_native_salt")) {
        const salt = crypto.getRandomValues(new Uint8Array(16));
        localStorage.setItem("pyspef_native_salt", btoa(String.fromCharCode(...salt)));
        localStorage.setItem("pyspef_native_db", "");
    }

    const saltStr = localStorage.getItem("pyspef_native_salt");
    const salt = Uint8Array.from(atob(saltStr), c => c.charCodeAt(0));
    
    try {
        derivedKey = await getKey(password, salt);
        const dbStr = localStorage.getItem("pyspef_native_db");
        
        const tbody = document.querySelector("#vault-table tbody");
        tbody.innerHTML = "";

        if (dbStr) {
            const encryptedData = Uint8Array.from(atob(dbStr), c => c.charCodeAt(0));
            const iv = encryptedData.slice(0, 12);
            const data = encryptedData.slice(12);
            
            const decrypted = await crypto.subtle.decrypt(
                { name: "AES-GCM", iv: iv }, derivedKey, data
            );
            
            const decoded = new TextDecoder().decode(decrypted);
            const sorok = JSON.parse(decoded);
            
            sorok.forEach(sor => {
                tbody.innerHTML += `<tr><td>${escapeHtml(sor.app)}</td><td>${escapeHtml(sor.user)}</td><td>${escapeHtml(sor.pass)}</td></tr>`;
            });
        }

        document.getElementById("login-panel").classList.add("hidden");
        document.getElementById("main-panel").classList.remove("hidden");
    } catch (e) {
        alert("Hibás jelszó vagy sérült adatbázis!");
        console.error(e);
    }
}

function generatePassword() {
    const hossz = parseInt(document.getElementById("pass-length").value);
    const karakterek = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!?*@#$";
    const values = new Uint32Array(hossz);
    crypto.getRandomValues(values);
    let result = "";
    for (let i = 0; i < hossz; i++) {
        result += karakterek[values[i] % karakterek.length];
    }
    document.getElementById("gen-result").value = result;
}

async function handleSave() {
    const app = document.getElementById("app-name").value;
    const user = document.getElementById("username").value;
    const pass = document.getElementById("gen-result").value;

    if (!app || !user || !pass) { alert("Tölts ki minden mezőt!"); return; }

    // Aktuális adatok betöltése
    let sorok = [];
    const dbStr = localStorage.getItem("pyspef_native_db");
    if (dbStr) {
        const encryptedData = Uint8Array.from(atob(dbStr), c => c.charCodeAt(0));
        const iv = encryptedData.slice(0, 12);
        const data = encryptedData.slice(12);
        const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, derivedKey, data);
        sorok = JSON.parse(new TextDecoder().decode(decrypted));
    }

    // Új adat hozzáadása
    sorok.push({ app, user, pass });

    // Újra-titkosítás
    const enc = new TextEncoder();
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const encrypted = await crypto.subtle.encrypt(
        { name: "AES-GCM", iv: iv }, derivedKey, enc.encode(JSON.stringify(sorok))
    );

    const finalArray = new Uint8Array(iv.length + encrypted.byteLength);
    finalArray.set(iv, 0);
    finalArray.set(new Uint8Array(encrypted), iv.length);

    const b64Result = btoa(String.fromCharCode(...finalArray));
    localStorage.setItem("pyspef_native_db", b64Result);

    const tbody = document.querySelector("#vault-table tbody");
    tbody.innerHTML += `<tr><td>${escapeHtml(app)}</td><td>${escapeHtml(user)}</td><td>${escapeHtml(pass)}</td></tr>`;

    document.getElementById("app-name").value = "";
    document.getElementById("username").value = "";
    document.getElementById("gen-result").value = "";
    alert("Adatok titkosítva és mentve!");
}

function exportBackup() {
    const salt = localStorage.getItem("pyspef_native_salt");
    const db = localStorage.getItem("pyspef_native_db");
    const backupData = JSON.stringify({ salt, db });
    
    const blob = new Blob([backupData], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "jelszomanager_mentes.json";
    a.click();
}

function escapeHtml(str) {
    return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(err => console.log("SW hiba", err));
}
</script>
</body>
</html>
